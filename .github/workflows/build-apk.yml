name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Restore Debug Keystore from Base64
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
          echo "Debug Keystore restored successfully."
        else
          echo "No debug.keystore.base64 found, relying on local builder."
        fi

    - name: Prepare secrets file
      run: |
        if [ -f .env.example ] && [ ! -f .env ]; then
          cp .env.example .env
          echo "Prepared .env from .env.example"
        fi

    - name: Ensure Gradle Wrapper is Executable
      run: |
        if [ ! -f gradlew ]; then
          echo "Warning: Gradle wrapper not found. Generating with gradle wrapper task..."
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Build Debug APK with Gradle
      run: ./gradlew assembleDebug

    - name: Upload Compiled APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LadaSamara-Chase-APK
        path: app/build/outputs/apk/debug/app-debug.apk
